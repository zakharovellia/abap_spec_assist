# Заполните значения перед применением (или создайте секрет своим способом:
# kubectl -n abap-spec-assist create secret generic backend-secrets \
#   --from-literal=LLM_API_KEY=... )
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: abap-spec-assist
type: Opaque
stringData:
  LLM_API_KEY: "CHANGE_ME"
  EMBEDDINGS_API_KEY: ""
  QDRANT_API_KEY: ""
  MCP_AUTH_TOKEN: "CHANGE_ME"
