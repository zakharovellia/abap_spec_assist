apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: abap-spec-assist
spec:
  # ВАЖНО: сессии чата хранятся в памяти процесса (MemorySaver), поэтому
  # replicas > 1 требует общего чекпоинтера (postgres/sqlite) и RWX-тома
  # для папки примеров.
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: abap-spec-assist/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          volumeMounts:
            - name: examples
              mountPath: /data/examples
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: examples
          persistentVolumeClaim:
            claimName: examples-data
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: abap-spec-assist
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
