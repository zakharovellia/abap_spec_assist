apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: abap-spec-assist
spec:
  # ВАЖНО: сессии чата — SQLite-файл на RWO-томе (checkpoints-data), поэтому
  # replicas > 1 требует общего чекпоинтера (postgres) и RWX-тома для папки
  # примеров.
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: abap-spec-assist/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          volumeMounts:
            - name: examples
              mountPath: /data/examples
            - name: checkpoints
              mountPath: /data/checkpoints
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: examples
          persistentVolumeClaim:
            claimName: examples-data
        - name: checkpoints
          persistentVolumeClaim:
            claimName: checkpoints-data
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: abap-spec-assist
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
