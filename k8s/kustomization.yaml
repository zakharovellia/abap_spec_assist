apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: abap-spec-assist

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - examples-pvc.yaml
  - qdrant.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml

# Подставьте свой registry и тег:
# kustomize edit set image abap-spec-assist/backend=registry.local/abap-spec-assist/backend:v0.1.0
images:
  - name: abap-spec-assist/backend
    newTag: latest
  - name: abap-spec-assist/frontend
    newTag: latest
