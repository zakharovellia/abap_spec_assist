apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: abap-spec-assist
data:
  LLM_BASE_URL: "http://llm-gateway.internal/v1"
  LLM_MODEL: "qwen2.5-32b-instruct"
  LLM_TEMPERATURE: "0.2"
  EMBEDDINGS_BASE_URL: ""
  EMBEDDINGS_MODEL: "frida"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "tz_examples"
  RAG_TOP_K: "4"
  CHECKPOINT_DB_PATH: "/data/checkpoints/checkpoints.sqlite3"
  SECTION_INDEX_DB_PATH: "/data/checkpoints/section_index.sqlite3"
  MCP_SERVER_URL: "http://sap-mcp.internal/mcp"
  MCP_TRANSPORT: "streamable_http"
  AUTH_ENABLED: "true"
  LDAP_SERVER: "ldaps://ldap.corp.example.com:636"
  LDAP_USE_SSL: "true"
  LDAP_BASE_DN: "dc=corp,dc=example,dc=com"
  LDAP_USER_DN_TEMPLATE: "uid={username},ou=people,dc=corp,dc=example,dc=com"
  LDAP_BIND_DN: ""
  LDAP_SEARCH_FILTER: "(sAMAccountName={username})"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "480"
  AUTH_COOKIE_SECURE: "true"
